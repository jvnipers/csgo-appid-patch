name: Build
on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']
jobs:
  build:
    runs-on: ubuntu-latest
    name: linux-x86
    steps:
      - uses: actions/checkout@v6
        with:
          path: project

      - name: Checkout SourceMod
        uses: actions/checkout@v6
        with:
          repository: alliedmodders/sourcemod
          ref: 1.12-dev
          submodules: recursive
          path: sourcemod

      - name: Checkout Metamod:Source
        uses: actions/checkout@v6
        with:
          repository: alliedmodders/metamod-source
          ref: 1.12-dev
          path: metamod-source

      - uses: actions/setup-python@v6
        name: Setup Python
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install AMBuild
        run: |
          git clone https://github.com/alliedmodders/ambuild.git
          cd ambuild
          python setup.py install --user

      - name: Install Linux dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-multilib g++-multilib libstdc++6 lib32stdc++6 \
            libc6-dev-i386 linux-libc-dev:i386

      - name: Build
        working-directory: project
        run: |
          mkdir build && cd build
          python ../configure.py \
            --sm-path="${{ github.workspace }}/sourcemod" \
            --mms-path="${{ github.workspace }}/metamod-source" \
            --enable-optimize \
            --targets=x86
          ambuild

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: csgo-appid-patch-linux
          path: project/build/**/*.so
